name: Real-time Market Watch

on:
  schedule:
    # 평일(월~금) 30분마다 실행
    - cron: "*/30 * * * 1-5"
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - run: pip install pandas yfinance requests lxml

      - run: python bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
